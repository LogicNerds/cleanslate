<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Clean Slate</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0F172A;--navy-light:#1E293B;--navy-mid:#162032;--navy-muted:#334155;--emerald:#10B981;--emerald-dark:#059669;--indigo:#6366F1;--indigo-light:#818CF8;--gold:#F59E0B;--red:#F87171;--sidebar-w:17rem}
    html,body{height:100%;font-family:'Inter',system-ui,sans-serif;background:var(--navy);color:#F8FAFC;margin:0}
    *{box-sizing:border-box}
    .font-display{font-family:'Playfair Display',Georgia,serif}
    .admin-nav{position:fixed;top:0;left:0;right:0;height:3.5rem;background:var(--navy-mid);border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;z-index:200;padding:0 1.25rem}
    .nav-logo-icon{width:1.5rem;height:1.5rem;border-radius:5px;background:var(--emerald);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .admin-badge{font-size:0.65rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;background:rgba(99,102,241,0.15);border:1px solid rgba(99,102,241,0.3);color:var(--indigo-light);border-radius:4px;padding:0.15rem 0.5rem}
    .admin-body{display:flex;margin-top:3.5rem;height:calc(100vh - 3.5rem)}
    .queue-panel{width:var(--sidebar-w);flex-shrink:0;background:var(--navy-mid);border-right:1px solid rgba(255,255,255,0.06);display:flex;flex-direction:column;position:fixed;top:3.5rem;left:0;bottom:0;overflow:hidden}
    .queue-header{padding:1rem 1.1rem 0.75rem;border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0}
    .queue-title{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#475569}
    .queue-count{font-size:0.7rem;color:#475569}
    .queue-search{width:100%;background:rgba(15,23,42,0.5);border:1px solid #1E293B;border-radius:0.4rem;color:#F8FAFC;padding:0.45rem 0.75rem;font-size:0.78rem;font-family:inherit;margin-top:0.6rem}
    .queue-search:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 2px rgba(99,102,241,0.12)}
    .queue-search::placeholder{color:#334155}
    .queue-list{flex:1;overflow-y:auto;padding:0.4rem 0}
    .queue-list::-webkit-scrollbar{width:4px}.queue-list::-webkit-scrollbar-track{background:transparent}.queue-list::-webkit-scrollbar-thumb{background:#1E293B;border-radius:2px}
    .queue-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1.1rem;cursor:pointer;border-left:2px solid transparent;transition:background 0.12s,border-color 0.12s}
    .queue-item:hover{background:rgba(255,255,255,0.03)}.queue-item.active{background:rgba(99,102,241,0.08);border-left-color:var(--indigo)}
    .queue-avatar{width:2rem;height:2rem;border-radius:50%;background:var(--navy-muted);display:flex;align-items:center;justify-content:center;font-size:0.72rem;font-weight:700;color:#94A3B8;flex-shrink:0;text-transform:uppercase}
    .queue-item-name{font-size:0.82rem;font-weight:600;color:#CBD5E1;line-height:1.2}
    .queue-item-date{font-size:0.68rem;color:#475569;margin-top:0.1rem}
    .status-pill{margin-left:auto;font-size:0.6rem;font-weight:700;letter-spacing:0.05em;text-transform:uppercase;border-radius:9999px;padding:0.2rem 0.5rem;white-space:nowrap;flex-shrink:0}
    .pill-awaiting{background:rgba(245,158,11,0.12);color:var(--gold);border:1px solid rgba(245,158,11,0.25)}
    .pill-ready{background:rgba(99,102,241,0.12);color:var(--indigo-light);border:1px solid rgba(99,102,241,0.25)}
    .pill-completed{background:rgba(16,185,129,0.12);color:var(--emerald);border:1px solid rgba(16,185,129,0.25)}
    .workstation-panel{margin-left:var(--sidebar-w);flex:1;overflow-y:auto;padding:1.75rem 2rem 5rem}
    .empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#334155;text-align:center;padding:2rem}
    .empty-icon{width:3rem;height:3rem;border-radius:50%;background:rgba(255,255,255,0.03);border:1px solid #1E293B;display:flex;align-items:center;justify-content:center;margin:0 auto 1rem}
    .client-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:0.75rem;margin-bottom:1.5rem}
    .client-name-block .client-name{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:1.4rem;color:#F8FAFC;line-height:1.2}
    .client-name-block .client-meta{font-size:0.75rem;color:#475569;margin-top:0.2rem}
    .ws-card{background:rgba(30,41,59,0.55);border:1px solid rgba(255,255,255,0.06);border-radius:0.875rem;margin-bottom:1.25rem;overflow:hidden}
    .ws-card-header{display:flex;align-items:center;justify-content:space-between;padding:0.875rem 1.25rem;border-bottom:1px solid rgba(255,255,255,0.05)}
    .ws-card-title{font-size:0.7rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#475569}
    .ws-card-body{padding:1.25rem}
    .notes-display{font-size:0.875rem;color:#94A3B8;line-height:1.75;white-space:pre-wrap;min-height:4rem}
    .notes-display.empty{color:#334155;font-style:italic}
    .debt-view-table{width:100%;border-collapse:collapse;font-size:0.82rem}
    .debt-view-table th{text-align:left;font-size:0.65rem;font-weight:700;letter-spacing:0.07em;text-transform:uppercase;color:#475569;padding:0 0.75rem 0.6rem;border-bottom:1px solid #1E293B}
    .debt-view-table td{padding:0.55rem 0.75rem;color:#CBD5E1;border-bottom:1px solid rgba(255,255,255,0.04)}
    .debt-view-table tr:last-child td{border-bottom:none}
    .debt-view-table .num{font-variant-numeric:tabular-nums;color:#94A3B8}.debt-view-table .rate{color:var(--gold)}
    .debt-total-row td{border-top:1px solid #1E293B!important;border-bottom:none!important;font-weight:600;color:#F8FAFC;padding-top:0.75rem!important}
    .file-dl-btn{display:flex;align-items:center;gap:0.75rem;background:rgba(15,23,42,0.5);border:1px solid #1E293B;border-radius:0.6rem;padding:0.75rem 1rem;cursor:pointer;transition:border-color 0.15s,background 0.15s;text-decoration:none;margin-bottom:0.6rem;width:100%}
    .file-dl-btn:hover{border-color:rgba(16,185,129,0.35);background:rgba(16,185,129,0.04)}
    .file-dl-icon{width:2rem;height:2rem;border-radius:0.4rem;background:rgba(16,185,129,0.1);display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .file-dl-name{font-size:0.82rem;font-weight:500;color:#CBD5E1}.file-dl-meta{font-size:0.7rem;color:#475569;margin-top:0.1rem}.file-dl-arrow{margin-left:auto;color:#334155}
    .admin-field-label{display:block;font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#475569;margin-bottom:0.4rem}
    .admin-field{width:100%;background:rgba(15,23,42,0.6);border:1px solid #1E293B;border-radius:0.5rem;color:#F8FAFC;padding:0.65rem 0.9rem;font-size:0.85rem;font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:1rem}
    .admin-field:focus{outline:none;border-color:var(--indigo);box-shadow:0 0 0 2px rgba(99,102,241,0.15)}.admin-field::placeholder{color:#334155}
    .upload-row{display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem}
    .file-pick-zone{flex:1;background:rgba(15,23,42,0.4);border:1px dashed #1E293B;border-radius:0.5rem;padding:0.65rem 1rem;font-size:0.82rem;color:#475569;cursor:pointer;position:relative;transition:border-color 0.15s,color 0.15s}
    .file-pick-zone:hover{border-color:var(--emerald);color:var(--emerald)}
    .file-pick-zone input[type="file"]{position:absolute;inset:0;width:100%;height:100%;opacity:0;cursor:pointer}
    .file-pick-label{font-size:0.72rem;color:#475569;white-space:nowrap}
    .btn-deliver{width:100%;background:linear-gradient(135deg,var(--emerald),var(--emerald-dark));color:#fff;border:none;font-weight:700;border-radius:0.75rem;padding:0.9rem 1.5rem;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:transform 0.15s,box-shadow 0.15s;letter-spacing:0.01em}
    .btn-deliver:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(16,185,129,0.3)}.btn-deliver:active{transform:translateY(0)}
    .btn-deliver:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .toast-confirm{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(4px);background:var(--navy-light);border:1px solid rgba(16,185,129,0.3);border-radius:0.625rem;padding:0.75rem 1.25rem;display:flex;align-items:center;gap:0.6rem;font-size:0.82rem;color:var(--emerald);font-weight:600;opacity:0;transition:opacity 0.3s ease,transform 0.3s ease;z-index:500;pointer-events:none}
    .toast-confirm.show{opacity:1;transform:translateX(-50%) translateY(0)}
    /* Delete confirmation modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:600;display:flex;align-items:center;justify-content:center;padding:1.5rem}
    .modal-card{background:var(--navy-light);border:1px solid rgba(248,113,113,0.25);border-radius:1rem;padding:1.75rem;width:100%;max-width:26rem;position:relative}
    .modal-title{font-family:'Playfair Display',Georgia,serif;font-weight:700;font-size:1.15rem;color:var(--red);margin-bottom:0.25rem}
    .modal-sub{font-size:0.8rem;color:#94A3B8;line-height:1.6;margin-bottom:1.5rem}
    .modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:#475569;cursor:pointer;padding:0.25rem;line-height:1;transition:color 0.15s}
    .modal-close:hover{color:#F8FAFC}
    .modal-field-label{display:block;font-size:0.7rem;font-weight:600;letter-spacing:0.05em;text-transform:uppercase;color:#475569;margin-bottom:0.4rem}
    .modal-field{width:100%;background:rgba(15,23,42,0.6);border:1px solid #1E293B;border-radius:0.5rem;color:#F8FAFC;padding:0.65rem 0.9rem;font-size:0.85rem;font-family:inherit;transition:border-color 0.2s,box-shadow 0.2s;margin-bottom:1rem}
    .modal-field:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 2px rgba(248,113,113,0.15)}
    .modal-field::placeholder{color:#334155}
    .modal-msg-error{font-size:0.75rem;color:var(--red);margin-bottom:0.75rem;display:none}
    .btn-modal-danger{width:100%;background:linear-gradient(135deg,#F87171,#DC2626);color:#fff;border:none;font-weight:700;border-radius:0.75rem;padding:0.9rem 1.5rem;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:transform 0.15s,box-shadow 0.15s}
    .btn-modal-danger:hover{transform:translateY(-1px);box-shadow:0 8px 25px rgba(220,38,38,0.3)}
    .btn-modal-danger:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-delete-client{width:100%;background:none;border:1px solid rgba(248,113,113,0.3);color:var(--red);font-weight:600;border-radius:0.75rem;padding:0.85rem 1.5rem;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;gap:0.6rem;transition:background 0.15s,border-color 0.15s}
    .btn-delete-client:hover{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.5)}
    /* Loading */
    .portal-loading{position:fixed;inset:0;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:1rem}
    .spinner-ring{width:2.5rem;height:2.5rem;border:3px solid rgba(255,255,255,0.08);border-top-color:var(--emerald);border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes popIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
    .pop-in{animation:popIn 0.25s ease forwards}
    ::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:#1E293B;border-radius:3px}
    @media(max-width:768px){.queue-panel{display:none}.workstation-panel{margin-left:0;padding:1.25rem 1rem 4rem}}
    @media(prefers-reduced-motion:reduce){*,::before,::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important}}
  </style>
</head>
<body>

  <!-- Loading -->
  <div class="portal-loading" id="portal-loading">
    <div class="spinner-ring"></div>
    <div style="font-size:0.85rem;color:#475569;">Verifying access…</div>
  </div>

  <!-- Nav -->
  <nav class="admin-nav" aria-label="Admin navigation" id="admin-nav" style="display:none;">
    <div class="d-flex align-items-center gap-2">
      <div class="nav-logo-icon"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg></div>
      <span class="font-display fw-bold text-white" style="font-size:0.95rem;">Clean Slate</span>
      <span class="admin-badge">Admin</span>
    </div>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span style="font-size:0.75rem;color:#334155;" id="nav-clock"></span>
      <a href="../" style="font-size:0.78rem;color:#475569;text-decoration:none;transition:color 0.15s;" onmouseover="this.style.color='#CBD5E1'" onmouseout="this.style.color='#475569'">← Back to site</a>
    </div>
  </nav>

  <div class="admin-body" id="admin-body" style="display:none;">

    <!-- Left: Queue -->
    <aside class="queue-panel" aria-label="Client queue">
      <div class="queue-header">
        <div class="d-flex align-items-center justify-content-between">
          <span class="queue-title">Client Queue</span>
          <span class="queue-count" id="queue-count"></span>
        </div>
        <input type="search" class="queue-search" id="queue-search" placeholder="Search clients…" aria-label="Search clients"/>
      </div>
      <div class="queue-list" id="queue-list" role="list" aria-label="Client list"></div>
    </aside>

    <!-- Right: Workstation -->
    <main class="workstation-panel" id="workstation" aria-label="Client workstation">
      <div class="empty-state" id="empty-state">
        <div class="empty-icon"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="#334155" stroke-width="1.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/></svg></div>
        <div style="font-size:0.82rem;color:#334155;">Select a client to open their workstation</div>
      </div>
      <div id="client-workstation" style="display:none;" aria-live="polite"></div>
    </main>
  </div>

  <div class="toast-confirm" id="deliver-toast" role="status" aria-live="polite">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    Audit marked as complete and delivered!
  </div>

  <div class="toast-confirm" id="delete-toast" role="status" aria-live="polite" style="border-color:rgba(248,113,113,0.3);color:var(--red);">
    <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
    Client account permanently deleted.
  </div>

  <!-- Delete client confirmation modal -->
  <div id="delete-client-modal" class="modal-overlay" style="display:none;" role="dialog" aria-modal="true" aria-labelledby="delete-client-modal-title">
    <div class="modal-card">
      <button class="modal-close" id="close-delete-client-modal" aria-label="Close">
        <svg width="18" height="18" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>
      <div class="modal-title" id="delete-client-modal-title">Delete Client Account</div>
      <div class="modal-sub" id="delete-client-modal-sub"></div>

      <label for="delete-client-confirm-email" class="modal-field-label">Type the client's email to confirm</label>
      <input type="text" id="delete-client-confirm-email" class="modal-field" placeholder="client@example.com" autocomplete="off"/>

      <p class="modal-msg-error" id="delete-client-error" role="alert" aria-live="polite"></p>

      <button class="btn-modal-danger" id="delete-client-submit" type="button">
        <span class="btn-label">Permanently Delete Client</span>
      </button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>

  <script type="module">
    import { initializeApp }                               from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut }        from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs,
             doc, updateDoc, getDoc }                      from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
    import { getStorage, ref, getDownloadURL, uploadBytes } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js";

    const firebaseConfig = {
      apiKey:            "AIzaSyCAaV-KqLvO7SlMTsxESvDrHs3VByRmlAY",
      authDomain:        "cleanslate-d2abc.firebaseapp.com",
      projectId:         "cleanslate-d2abc",
      storageBucket:     "cleanslate-d2abc.firebasestorage.app",
      messagingSenderId: "100758365889",
      appId:             "1:100758365889:web:bffece3bda6fb64046d640",
      measurementId:     "G-3SV37N8RLT"
    };

    const ADMIN_UID = "D8noLoyd4DNJPBdqyok6fBV2VRv2";

    const app     = initializeApp(firebaseConfig);
    const auth    = getAuth(app);
    const db      = getFirestore(app);
    const storage = getStorage(app);

    // ── Cloudflare Worker URL ────────────────────────────────────
    const WORKER_URL = 'https://summer-mode-328d.elijah-029.workers.dev';

    // ── Email helper — fire-and-forget, never blocks UI ─────────
    async function sendEmail(to, subject, html) {
      try {
        await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ to, subject, html }),
        });
      } catch (e) {
        console.warn('Email send failed:', e);
      }
    }

    // ── Auth gate: admin only ────────────────────────────────────
    onAuthStateChanged(auth, async user => {
      if (!user || user.uid !== ADMIN_UID) {
        window.location.href = '../';
        return;
      }
      document.getElementById('portal-loading').style.display = 'none';
      document.getElementById('admin-nav').style.display      = '';
      document.getElementById('admin-body').style.display     = 'flex';
      startClock();
      await loadClients();
    });

    // ── Clock ────────────────────────────────────────────────────
    function startClock() {
      function tick() {
        document.getElementById('nav-clock').textContent =
          new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      }
      tick(); setInterval(tick, 30000);
    }

    // ── Load clients from Firestore ──────────────────────────────
    let clients  = [];
    let activeId = null;

    async function loadClients() {
      const snap = await getDocs(collection(db, 'users'));
      clients = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      // Exclude admin's own account from the queue
      clients = clients.filter(c => c.id !== ADMIN_UID);
      renderQueue(clients);
    }

    // ── Render queue ─────────────────────────────────────────────
    function renderQueue(list) {
      const container = document.getElementById('queue-list');
      document.getElementById('queue-count').textContent = list.length + ' client' + (list.length !== 1 ? 's' : '');
      container.innerHTML = '';

      if (!list.length) {
        container.innerHTML = '<div style="padding:1.5rem 1.1rem;font-size:0.78rem;color:#334155;">No clients yet.</div>';
        return;
      }

      const order  = { ready: 0, submitted: 1, awaiting: 2, pending: 3, completed: 4 };
      const sorted = [...list].sort((a, b) => (order[a.auditStatus] ?? 5) - (order[b.auditStatus] ?? 5));

      sorted.forEach(client => {
        const initials   = (client.displayName || client.email || '??').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
        const pillClass  = statusPillClass(client.auditStatus);
        const pillLabel  = statusLabel(client.auditStatus);
        const dateStr    = client.submittedAt ? formatDate(client.submittedAt.toDate ? client.submittedAt.toDate() : new Date(client.submittedAt)) : '—';

        const item = document.createElement('div');
        item.className = 'queue-item' + (client.id === activeId ? ' active' : '');
        item.setAttribute('role', 'listitem');
        item.setAttribute('tabindex', '0');
        item.setAttribute('aria-label', (client.displayName || client.email) + ' — ' + pillLabel);
        item.dataset.id = client.id;

        item.innerHTML = `
          <div class="queue-avatar">${initials}</div>
          <div style="min-width:0;flex:1;">
            <div class="queue-item-name">${escHtml(client.displayName || client.email || 'Unknown')}</div>
            <div class="queue-item-date">${dateStr}</div>
          </div>
          <span class="status-pill ${pillClass}">${pillLabel}</span>`;

        item.addEventListener('click', () => selectClient(client.id));
        item.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') selectClient(client.id); });
        container.appendChild(item);
      });
    }

    // ── Search ───────────────────────────────────────────────────
    document.getElementById('queue-search').addEventListener('input', function() {
      const q = this.value.trim().toLowerCase();
      renderQueue(q ? clients.filter(c => (c.displayName || '').toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q)) : clients);
    });

    // ── Select client ────────────────────────────────────────────
    async function selectClient(id) {
      activeId = id;
      document.querySelectorAll('.queue-item').forEach(el => el.classList.toggle('active', el.dataset.id === id));

      document.getElementById('empty-state').style.display = 'none';
      const ws = document.getElementById('client-workstation');
      ws.style.display = '';
      ws.innerHTML = '<div style="padding:3rem;text-align:center;color:#334155;font-size:0.85rem;">Loading client data…</div>';

      // Always fetch fresh from Firestore so we never show stale data
      const snap = await getDoc(doc(db, 'users', id));
      if (!snap.exists()) {
        ws.innerHTML = '<div style="padding:3rem;text-align:center;color:#F87171;font-size:0.85rem;">Client record not found.</div>';
        return;
      }
      const client = { id: snap.id, ...snap.data() };

      // Update local cache too so queue re-renders correctly
      const idx = clients.findIndex(c => c.id === id);
      if (idx !== -1) clients[idx] = client;

      // Resolve Storage download URLs for uploaded files
      const resolveUrls = async (paths) => {
        if (!paths || !paths.length) return [];
        return Promise.all(paths.map(async path => {
          try { return { name: path.split('/').pop(), url: await getDownloadURL(ref(storage, path)) }; }
          catch (e) { return { name: path.split('/').pop(), url: null }; }
        }));
      };

      const incomeFiles    = await resolveUrls(client.incomeFilePaths);
      const statementFiles = await resolveUrls(client.statementFilePaths);

      ws.innerHTML = buildWorkstation(client, incomeFiles, statementFiles);
      ws.classList.remove('pop-in'); void ws.offsetWidth; ws.classList.add('pop-in');

      // Bind deliver button
      document.getElementById('btn-deliver-' + id)?.addEventListener('click', () => deliverAudit(id));

      // Bind delete button
      document.getElementById('btn-delete-' + id)?.addEventListener('click', e => {
        const btn = e.currentTarget;
        openDeleteModal(id, btn.dataset.name, btn.dataset.email);
      });

      // Bind dashboard HTML label
      const dashboardInput = document.getElementById('dashboard-upload-' + id);
      const dashboardLabel = document.getElementById('dashboard-label-' + id);
      if (dashboardInput && dashboardLabel) {
        dashboardInput.addEventListener('change', () => {
          dashboardLabel.textContent = dashboardInput.files[0] ? dashboardInput.files[0].name : 'Choose spreadsheet\u2026';
        });
      }
    }

    // ── Build workstation HTML ───────────────────────────────────
    function buildWorkstation(client, incomeFiles, statementFiles) {
      const pillClass = statusPillClass(client.auditStatus);
      const pillLabel = statusLabel(client.auditStatus);
      const dateStr   = client.submittedAt ? formatDate(client.submittedAt.toDate ? client.submittedAt.toDate() : new Date(client.submittedAt)) : '—';

      // Debt rows
      let debtRows = '';
      let totalBalance = 0, totalMin = 0;
      if (client.debts && client.debts.length) {
        client.debts.forEach(d => {
          totalBalance += d.balance || 0;
          totalMin     += d.minPayment || 0;
          debtRows += `<tr>
            <td>${escHtml(d.name)}</td>
            <td class="num">$${fmt(d.balance || 0)}</td>
            <td class="rate">${d.rate > 0 ? d.rate.toFixed(2) + '%' : '—'}</td>
            <td class="num">$${fmt(d.minPayment || 0)}</td></tr>`;
        });
        debtRows += `<tr class="debt-total-row"><td>Total</td><td class="num">$${fmt(totalBalance)}</td><td></td><td class="num">$${fmt(totalMin)}/mo</td></tr>`;
      } else {
        debtRows = '<tr><td colspan="4" style="color:#334155;font-style:italic;padding:0.75rem;">No debt entries submitted yet.</td></tr>';
      }

      const fileButtons = (files, folder) => files.length
        ? files.map(f => f.url
            ? `<a href="${f.url}" class="file-dl-btn" target="_blank" rel="noopener noreferrer" aria-label="Download ${escHtml(f.name)}"><div class="file-dl-icon"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="var(--emerald)" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><div><div class="file-dl-name">${escHtml(f.name)}</div><div class="file-dl-meta">Click to download</div></div><svg class="file-dl-arrow" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg></a>`
            : `<div class="file-dl-btn" style="opacity:0.4;cursor:default;"><div class="file-dl-icon"><svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="var(--emerald)" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/></svg></div><div><div class="file-dl-name">${escHtml(f.name)}</div><div class="file-dl-meta">URL unavailable</div></div></div>`
          ).join('')
        : '<p style="font-size:0.82rem;color:#334155;font-style:italic;margin:0;">No files uploaded yet.</p>';

      // Questionnaire display
      const q = client.questionnaire || {};
      const objectiveLabel = q.primaryObjective === 'pay-debt'
        ? 'Aggressively pay down debt'
        : q.primaryObjective === 'emergency-fund'
        ? 'Build an emergency savings fund'
        : null;

      const questionnaireHtml = (q.estimatedSubscriptions != null || q.estimatedDiningOut != null || objectiveLabel || q.monthlyRent != null || q.estimatedGroceries != null || q.monthlyDebtPayment != null || q.estimatedUtilities != null || q.estimatedInsurance != null || q.estimatedGas != null || q.estimatedChildcare != null)
        ? `<div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:${client.notes ? '1.25rem' : '0'};">
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Rent / Mortgage</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.monthlyRent != null ? '$' + q.monthlyRent.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Utilities estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedUtilities != null ? '$' + q.estimatedUtilities.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Insurance estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedInsurance != null ? '$' + q.estimatedInsurance.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Gas estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedGas != null ? '$' + q.estimatedGas.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Grocery estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedGroceries != null ? '$' + q.estimatedGroceries.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Childcare estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedChildcare != null ? '$' + q.estimatedChildcare.toLocaleString() + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Monthly debt payment</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.monthlyDebtPayment != null ? '$' + q.monthlyDebtPayment.toLocaleString() + '/mo' + (q.usedMinimumPayments ? ' (minimums)' : '') : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Subscription estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedSubscriptions != null ? '$' + q.estimatedSubscriptions + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Dining &amp; convenience estimate</div>
              <div style="font-size:0.95rem;font-weight:600;color:#F8FAFC;">${q.estimatedDiningOut != null ? '$' + q.estimatedDiningOut + '/mo' : '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
            <div style="background:rgba(15,23,42,0.4);border:1px solid #1E293B;border-radius:0.5rem;padding:0.75rem 1rem;grid-column:1/-1;">
              <div style="font-size:0.65rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#475569;margin-bottom:0.3rem;">Primary objective</div>
              <div style="font-size:0.875rem;font-weight:600;color:#F8FAFC;">${objectiveLabel || '<span style="color:#334155;font-style:italic;">Not provided</span>'}</div>
            </div>
          </div>`
        : '';

      const notesHtml = client.notes
        ? `<div class="notes-display">${escHtml(client.notes)}</div>`
        : `<div class="notes-display empty">Client left no additional notes.</div>`;

      return `
        <div class="client-header">
          <div class="client-name-block">
            <div class="client-name">${escHtml(client.displayName || client.email || 'Unknown')}</div>
            <div class="client-meta">${escHtml(client.email || '')} &nbsp;·&nbsp; Submitted ${dateStr}</div>
          </div>
          <span class="status-pill ${pillClass}" style="font-size:0.68rem;padding:0.3rem 0.75rem;">${pillLabel}</span>
        </div>

        <div class="ws-card">
          <div class="ws-card-header"><span class="ws-card-title">Client Notes &amp; Goals</span></div>
          <div class="ws-card-body">${questionnaireHtml}${notesHtml}</div>
        </div>

        <div class="ws-card">
          <div class="ws-card-header">
            <span class="ws-card-title">Debt Inventory</span>
            ${client.debts?.length ? `<span style="font-size:0.72rem;color:#475569;">${client.debts.length} item${client.debts.length !== 1 ? 's' : ''}</span>` : ''}
          </div>
          <div class="ws-card-body" style="padding:0.75rem 0 0;">
            <div style="overflow-x:auto;padding:0 1.25rem 1.25rem;">
              <table class="debt-view-table" aria-label="Debt inventory for ${escHtml(client.displayName || '')}">
                <thead><tr><th>Debt</th><th>Balance</th><th>Rate</th><th>Min. Payment</th></tr></thead>
                <tbody>${debtRows}</tbody>
              </table>
            </div>
          </div>
        </div>

        <div class="ws-card">
          <div class="ws-card-header">
            <span class="ws-card-title">Income Documents</span>
            <span style="font-size:0.72rem;color:#475569;">${incomeFiles.length} file${incomeFiles.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="ws-card-body">${fileButtons(incomeFiles, 'income')}</div>
        </div>

        <div class="ws-card">
          <div class="ws-card-header">
            <span class="ws-card-title">Bank &amp; Credit Card Statements</span>
            <span style="font-size:0.72rem;color:#475569;">${statementFiles.length} file${statementFiles.length !== 1 ? 's' : ''}</span>
          </div>
          <div class="ws-card-body">${fileButtons(statementFiles, 'statements')}</div>
        </div>

        <div class="ws-card">
          <div class="ws-card-header"><span class="ws-card-title">Deliver Audit Results</span></div>
          <div class="ws-card-body">
            <label class="admin-field-label" for="loom-${client.id}">Video walkthrough link</label>
            <input type="url" id="loom-${client.id}" class="admin-field" placeholder="YouTube, Loom, or Vimeo URL" value="${escHtml(client.loomUrl || '')}" aria-label="Video walkthrough link"/>

            <label class="admin-field-label">Client Workbook</label>
            <div class="upload-row">
              <div class="file-pick-zone" role="button" tabindex="0" aria-label="Choose client workbook file">
                <input type="file" id="dashboard-upload-${client.id}" accept=".xlsx" aria-label="Upload client workbook"/>
                <span id="dashboard-label-${client.id}" class="file-pick-label">${client.dashboardPath ? '\u2713 Workbook already uploaded \u2014 choose new to replace' : 'Choose spreadsheet\u2026'}</span>
              </div>
            </div>

            <p id="deliver-error-${client.id}" style="font-size:0.78rem;color:#F87171;display:none;margin-bottom:0.75rem;" role="alert" aria-live="polite"></p>

            <button class="btn-deliver" id="btn-deliver-${client.id}" type="button">
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
              Mark Audit as Complete &amp; Deliver
            </button>
          </div>
        </div>

        <div class="ws-card" style="border-color:rgba(248,113,113,0.15);">
          <div class="ws-card-header"><span class="ws-card-title" style="color:var(--red);">Danger Zone</span></div>
          <div class="ws-card-body">
            <p style="font-size:0.8rem;color:#64748B;margin-bottom:1rem;">Permanently deletes this client's uploaded documents, questionnaire answers, and login. This cannot be undone.</p>
            <button class="btn-delete-client" id="btn-delete-${client.id}" type="button" data-email="${escHtml(client.email || '')}" data-name="${escHtml(client.displayName || client.email || 'this client')}">
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
              Delete Client Account
            </button>
          </div>
        </div>`;
    }

    // ── Deliver audit ────────────────────────────────────────────
    async function deliverAudit(id) {
      const loomVal       = document.getElementById('loom-' + id)?.value.trim();
      const dashboardInput = document.getElementById('dashboard-upload-' + id);
      const errEl         = document.getElementById('deliver-error-' + id);
      const btn           = document.getElementById('btn-deliver-' + id);

      errEl.style.display = 'none';

      if (!loomVal) {
        errEl.textContent = 'Please add a video link before delivering.';
        errEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Delivering\u2026';

      try {
        let dashboardPath = null;

        // Upload client workbook to Storage if one was selected
        if (dashboardInput?.files[0]) {
          dashboardPath = `clients/${id}/workbook.xlsx`;
          await uploadBytes(ref(storage, dashboardPath), dashboardInput.files[0], {
            contentType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
            customMetadata: { 'Content-Disposition': 'attachment' },
          });
        }

        // Write delivery data to Firestore
        const update = {
          auditStatus:  'completed',
          deliveredAt:  new Date(),
          loomUrl:      loomVal || null,
        };
        if (dashboardPath) update.dashboardPath = dashboardPath;

        await updateDoc(doc(db, 'users', id), update);

        // ── Email: Blueprint ready notification to client ────────
        const clientSnap  = await getDoc(doc(db, 'users', id));
        const clientData  = clientSnap.exists() ? clientSnap.data() : {};
        const clientEmail = clientData.email || null;
        const clientName  = clientData.displayName || 'there';

        if (clientEmail) {
          sendEmail(
            clientEmail,
            'Your Clean Slate Blueprint is Ready!',
            `<div style="font-family:Inter,sans-serif;max-width:520px;margin:0 auto;color:#1E293B;">
              <h2 style="color:#10B981;">Your blueprint is ready, ${clientName}!</h2>
              <p>Your custom audit is complete. Log into your portal to watch your personal video walkthrough and download your interactive digital workbook.</p>
              <p style="margin-top:1.5rem;">
                <a href="https://logicnerds.github.io/cleanslate/portal/index.html" style="background:#10B981;color:#fff;padding:0.75rem 1.5rem;border-radius:8px;text-decoration:none;font-weight:600;">View My Blueprint</a>
              </p>
              <p style="color:#64748B;font-size:0.85rem;margin-top:2rem;">If you have any questions about your results, just reply to this email.</p>
              <p style="color:#64748B;font-size:0.85rem;">\u2014 Elijah<br>Clean Slate Audit</p>
            </div>`
          );
        }

        // Update local clients cache
        const client = clients.find(c => c.id === id);
        if (client) Object.assign(client, update);

        renderQueue(clients);

        // Update status pill in workstation
        const pillEl = document.querySelector('#client-workstation .status-pill');
        if (pillEl) { pillEl.className = 'status-pill pill-completed'; pillEl.style.cssText = 'font-size:0.68rem;padding:0.3rem 0.75rem;'; pillEl.textContent = 'Completed'; }

        // Toast
        const toast = document.getElementById('deliver-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);

      } catch (err) {
        console.error('Delivery error:', err);
        errEl.textContent = 'Delivery failed. Please check your connection and try again.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Mark Audit as Complete & Deliver';
      }
    }

    // ── Delete client account ─────────────────────────────────────
    const deleteClientModal  = document.getElementById('delete-client-modal');
    const deleteClientSub    = document.getElementById('delete-client-modal-sub');
    const deleteClientInput  = document.getElementById('delete-client-confirm-email');
    const deleteClientError  = document.getElementById('delete-client-error');
    const deleteClientSubmit = document.getElementById('delete-client-submit');
    let   pendingDeleteId    = null;
    let   pendingDeleteEmail = null;

    function openDeleteModal(id, name, email) {
      pendingDeleteId    = id;
      pendingDeleteEmail = (email || '').trim().toLowerCase();
      deleteClientSub.textContent = `This permanently deletes ${name}'s uploaded documents, questionnaire answers, and login. This cannot be undone.`;
      deleteClientInput.value = '';
      deleteClientError.style.display = 'none';
      deleteClientSubmit.disabled = false;
      deleteClientModal.style.display = 'flex';
      deleteClientInput.focus();
    }

    function closeDeleteModal() {
      deleteClientModal.style.display = 'none';
      pendingDeleteId = null;
      pendingDeleteEmail = null;
    }

    document.getElementById('close-delete-client-modal').addEventListener('click', closeDeleteModal);
    deleteClientModal.addEventListener('click', e => { if (e.target === deleteClientModal) closeDeleteModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape' && deleteClientModal.style.display !== 'none') closeDeleteModal(); });

    deleteClientSubmit.addEventListener('click', async () => {
      deleteClientError.style.display = 'none';

      const typedEmail = deleteClientInput.value.trim().toLowerCase();
      if (!pendingDeleteEmail) {
        deleteClientError.textContent = 'This client has no email on file — cannot confirm deletion safely.';
        deleteClientError.style.display = 'block';
        return;
      }
      if (typedEmail !== pendingDeleteEmail) {
        deleteClientError.textContent = 'Email doesn\u2019t match. Please type it exactly to confirm.';
        deleteClientError.style.display = 'block';
        return;
      }

      deleteClientSubmit.disabled = true;
      deleteClientSubmit.textContent = 'Deleting\u2026';

      try {
        const idToken = await auth.currentUser.getIdToken(true);

        const resp = await fetch(WORKER_URL, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ action: 'deleteAccount', idToken, targetUid: pendingDeleteId }),
        });
        const result = await resp.json();

        if (!resp.ok || result.error) {
          throw new Error(result.error || 'Deletion failed. Please try again.');
        }

        // Remove from local state and UI
        clients = clients.filter(c => c.id !== pendingDeleteId);
        renderQueue(clients);
        document.getElementById('client-workstation').style.display = 'none';
        document.getElementById('empty-state').style.display = '';
        activeId = null;

        closeDeleteModal();

        const toast = document.getElementById('delete-toast');
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3500);

      } catch (err) {
        console.error('Client deletion error:', err);
        deleteClientError.textContent = err.message || 'Deletion failed. Please try again.';
        deleteClientError.style.display = 'block';
      } finally {
        deleteClientSubmit.disabled = false;
        deleteClientSubmit.textContent = 'Permanently Delete Client';
      }
    });

    // ── Helpers ──────────────────────────────────────────────────
    function statusPillClass(s) { return { submitted:'pill-ready', ready:'pill-ready', awaiting:'pill-awaiting', pending:'pill-awaiting', completed:'pill-completed' }[s] || 'pill-awaiting'; }
    function statusLabel(s)     { return { submitted:'Ready to Audit', ready:'Ready to Audit', awaiting:'Awaiting Docs', pending:'Awaiting Docs', completed:'Completed' }[s] || 'Awaiting Docs'; }

    function fmt(n) { return (n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function formatDate(d) {
      if (!d) return '';
      const date = d instanceof Date ? d : new Date(d);
      return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
